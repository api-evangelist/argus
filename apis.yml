aid: argus
name: ARGUS
description: >-
  ARGUS is the industry-standard suite of commercial real estate software solutions by
  Altus Group. The ARGUS platform includes ARGUS Enterprise (property valuation and cash
  flow forecasting), ARGUS Developer (development feasibility and project management),
  ARGUS Intelligence Platform (portfolio analytics, asset management, and fund management),
  ARGUS EstateMaster (property development feasibility), and ARGUS Taliance (real estate
  fund management). ARGUS is recognized as the industry standard and taught at 200+ universities
  worldwide. The ARGUS API provides integration capabilities across cloud-enabled ARGUS solutions.
type: Index
