apis:
  - aid: argus:argus-api
    name: ARGUS API
    description: >-
      The ARGUS API is a cloud-based integration gateway that provides programmatic access
      to data in ARGUS Enterprise and other cloud-enabled ARGUS solutions. It enables users
      to extract and ingest data, trigger calculations, and integrate ARGUS models with
      third-party property management, ERP, and analytics systems without logging into
      the ARGUS application.
    humanURL: https://www.altusgroup.com/solutions/argus-integrations/
    tags:
      - API Integration
      - Commercial Real Estate
      - Data Integration
    properties:
      - type: Documentation
        url: https://www.altusgroup.com/argus/downloads/argus-integration-solutions/
      - type: GettingStarted
        url: https://www.altusgroup.com/support/start-using-argus-intelligence/
  - aid: argus:argus-enterprise
    name: ARGUS Enterprise
    description: >-
      The industry-standard commercial property valuation and cash flow forecasting software
      providing lease-by-lease modeling, DCF valuations, budgeting, scenario testing, and
      40+ portfolio reports.
    humanURL: https://www.altusgroup.com/solutions/argus-enterprise/
    tags:
      - Cash Flow Modeling
      - Commercial Real Estate
      - Portfolio Management
      - Valuation
    properties:
      - type: Documentation
        url: https://www.altusgroup.com/argus/downloads/argus-enterprise/
  - aid: argus:argus-developer
    name: ARGUS Developer
    description: >-
      Real estate development feasibility and project management software for property
      developers, appraisers, and financiers covering pro forma modeling, residual land
      value, scenario analysis, and cash flow forecasting.
    humanURL: https://www.altusgroup.com/solutions/argus-developer/
    tags:
      - Cash Flow
      - Development
      - Feasibility Analysis
      - Real Estate
    properties:
      - type: Documentation
        url: https://www.altusgroup.com/argus/downloads/argus-developer/
  - aid: argus:argus-intelligence
    name: ARGUS Intelligence Platform
    description: >-
      Next-generation real estate investment management platform integrating ARGUS Enterprise
      with portfolio dashboards, benchmarking, asset manager, portfolio manager, and fund
      manager capabilities for comprehensive performance monitoring.
    humanURL: https://www.altusgroup.com/solutions/argus-intelligence/
    tags:
      - Asset Management
      - Benchmarking
      - Fund Management
      - Portfolio Analytics
    properties:
      - type: Documentation
        url: https://www.altusgroup.com/support/start-using-argus-intelligence/
  - aid: argus:argus-taliance
    name: ARGUS Taliance
    description: >-
      Real estate fund management software for modeling and managing the performance of
      real estate funds, supporting complex fund structures, waterfall calculations, and
      investor reporting.
    humanURL: https://www.altusgroup.com/solutions/argus-intelligence/
    tags:
